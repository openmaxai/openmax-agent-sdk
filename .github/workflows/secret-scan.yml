name: Secret Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Full git history is required so Gitleaks can scan every commit, not
      # just the tip. Pinned to a full commit SHA, matching the repo convention.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # Runs the free Gitleaks CLI via its official docker image. We deliberately
      # do NOT use gitleaks/gitleaks-action, which requires a GITLEAKS_LICENSE
      # for organization repositories. --exit-code=1 fails the job on findings.
      - name: Gitleaks detect (CLI)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.0 \
            detect --source=/repo --redact --verbose --exit-code=1
